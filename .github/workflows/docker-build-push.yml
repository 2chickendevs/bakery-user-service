name: Docker Build Push

on:
  workflow_call:
    inputs:
      remove_snapshot:
        required: false
        type: boolean
        default: false

env:
  GITHUB_REGISTRY_USER: ${{ secrets.GHRC_USER }}
  GITHUB_REGISTRY_TOKEN: ${{ secrets.GHRC_TOKEN }}

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Maven settings.xml
        run: |
          mkdir -p "$HOME/.m2"
          cat .github/deploy/settings.xml > "$HOME/.m2/settings.xml"

      - name: Remove -SNAPSHOT from pom files
        if: inputs.remove_snapshot
        run: |
          find . -name pom.xml -type f -print0 | while IFS= read -r -d '' file; do
            sed -i 's/-SNAPSHOT</</g' "$file"
          done

      - name: Compute Docker metadata from pom.xml
        id: meta
        run: |
          ARTIFACT_ID="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.artifactId | grep -v '^\[' | tail -n1 | tr '[:upper:]' '[:lower:]')"
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | grep -v '^\[' | tail -n1)"

          echo "artifact_id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build with Maven
        run: mvn -B -ntp clean install

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.meta.outputs.artifact_id }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max