name: Build & Push Docker (staging)

on:
  push:
    branches:
      - staging

env:
  GITHUB_REGISTRY_USER: ${{ secrets.GHRC_USER }}
  GITHUB_REGISTRY_TOKEN: ${{ secrets.GHRC_TOKEN }}

permissions:
  contents: write
  packages: write

jobs:
  remove-snapshot:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.snapshot_commit.outputs.changed }}

    steps:
      - name: Checkout staging
        uses: actions/checkout@v4

      - name: Remove -SNAPSHOT from pom files
        run: |
          find . -name pom.xml -type f -print0 | while IFS= read -r -d '' file; do
            sed -i 's/-SNAPSHOT</</g' "$file"
          done

      - name: Commit release version to staging if changed
        id: snapshot_commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes found"
          else
            git commit -m "Remove -SNAPSHOT for staging"
            git push origin HEAD:staging
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  maven-build:
    needs: remove-snapshot
    uses: ./.github/workflows/maven-build.yml
    with:
      remove_snapshot: true
    secrets: inherit

  docker-build-push:
    needs:
      - remove-snapshot
      - maven-build
    uses: ./.github/workflows/docker-build-push.yml
    with:
      remove_snapshot: true
    secrets: inherit